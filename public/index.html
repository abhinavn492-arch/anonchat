<!DOCTYPE html>
<html>
<head>
  <title>AnonChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #0a0a0a; color: white; text-align: center; margin: 0; padding: 20px; }
    button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; }
    #videoBtn { background: #4CAF50; color: white; }
    #textBtn { background: #2196F3; color: white; }
    #videos { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
    video { width: 45%; max-width: 400px; background: #222; border-radius: 8px; }
    #chat { max-width: 600px; margin: 0 auto; }
    #messages { height: 200px; overflow-y: auto; border: 1px solid #444; padding: 10px; text-align: left; margin: 10px 0; }
    #msgInput { width: 70%; padding: 10px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="start">
    <h1>AnonChat.cam</h1>
    <p>Talk to strangers anonymously</p>
    <button id="videoBtn" onclick="start('video')">Video Chat</button>
    <button id="textBtn" onclick="start('text')">Text Only</button>
  </div>

  <div id="chat" class="hidden">
    <div id="status">Connecting to stranger...</div>
    <div id="videos">
      <video id="localVideo" autoplay muted playsinline></video>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div id="messages"></div>
    <input id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMsg()" />
    <button onclick="next()">Next Stranger</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let pc, localStream, mode = 'video';
    
    async function start(selectedMode) {
      mode = selectedMode;
      document.getElementById('start').classList.add('hidden');
      document.getElementById('chat').classList.remove('hidden');
      
      if (mode === 'video') {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          document.getElementById('localVideo').srcObject = localStream;
        } catch (e) {
          alert('Camera blocked. Using Text Only mode.');
          mode = 'text';
          document.getElementById('videos').classList.add('hidden');
        }
      } else {
        document.getElementById('videos').classList.add('hidden');
      }
      
      socket.emit('join', { mode });
    }

    function sendMsg() {
      const input = document.getElementById('msgInput');
      if (input.value) {
        socket.emit('message', input.value);
        addMsg('You: ' + input.value);
        input.value = '';
      }
    }

    function addMsg(msg) {
      const div = document.getElementById('messages');
      div.innerHTML += '<div>' + msg + '</div>';
      div.scrollTop = div.scrollHeight;
    }

    function next() {
      socket.emit('next');
      document.getElementById('messages').innerHTML = '';
      document.getElementById('status').innerText = 'Finding new stranger...';
    }

    // Socket events - your existing WebRTC code goes here
    socket.on('message', addMsg);
    socket.on('status', (txt) => document.getElementById('status').innerText = txt);
    
    // Add your existing WebRTC peer connection code here
    // When creating offer/answer, only add localStream if mode === 'video'
  </script>
</body>
</html>
