<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnonChat.cam - Talk to Strangers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
    }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

    #start-screen { text-align: center; padding: 40px 20px; }
    #start-screen h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00dbde, #fc00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #start-screen p { color: #aaa; margin-bottom: 30px; font-size: 1.2rem; }

   .filter-section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 25px;
      margin: 20px auto 30px;
      max-width: 500px;
      text-align: left;
    }
   .filter-section h3 {
      margin-bottom: 15px;
      color: #00dbde;
      font-size: 1.1rem;
    }
   .filter-row { margin-bottom: 20px; }
   .filter-row label {
      display: block;
      margin-bottom: 8px;
      color: #ddd;
      font-size: 0.9rem;
    }
    select,.interest-tags {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: white;
      border-radius: 8px;
      font-size: 1rem;
    }
    select:focus { outline: none; border-color: #667eea; }
    
   .interest-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 50px;
    }
   .tag {
      padding: 8px 14px;
      background: rgba(102,126,234,0.2);
      border: 1px solid rgba(102,126,234,0.4);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
   .tag:hover { background: rgba(102,126,234,0.3); }
   .tag.active {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }

.mode-btn {
      padding: 18px 40px;
      margin: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      transition: transform 0.2s;
    }
.mode-btn:hover { transform: scale(1.05); }
    #videoBtn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    #textBtn { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }

    #chat-screen { display: none; }
    #status {
      text-align: center;
      font-size: 1.1rem;
      padding: 15px;
      background: rgba(102,126,234,0.2);
      border: 1px solid rgba(102,126,234,0.4);
      border-radius: 10px;
      margin-bottom: 20px;
      color: #fff;
      font-weight: 500;
    }
   .status-match {
      font-size: 0.85rem;
      color: #00dbde;
      margin-top: 5px;
    }

.main-content { display: flex; gap: 20px; }
.video-section { flex: 2; }
.sidebar { flex: 1; }

    #videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    video {
      width: 100%;
      background: #000;
      border-radius: 12px;
      aspect-ratio: 4/3;
      border: 2px solid rgba(255,255,255,0.1);
    }
.video-label {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
    }
.video-wrapper { position: relative; }

    #messages {
      height: 400px;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 15px;
      text-align: left;
      margin-bottom: 15px;
      border-radius: 12px;
      background: rgba(0,0,0,0.3);
    }
    #messages div { margin-bottom: 8px; padding: 8px; border-radius: 6px; }
.you { background: rgba(102,126,234,0.3); }
.stranger { background: rgba(245,87,108,0.3); }
.system { background: rgba(255,255,255,0.1); text-align: center; font-style: italic; color: #aaa; }

    #msgInput {
      width: 100%;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: white;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 10px;
    }
    #msgInput:focus { outline: none; border-color: #667eea; }
    #msgInput:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.action-btn {
      flex: 1;
      min-width: 120px;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    #nextBtn { background: #ff4757; color: white; }
    #nextBtn:hover { background: #ff3742; }
    #backBtn { background: #3498db; color: white; }
    #backBtn:hover { background: #2980b9; }
    #reportBtn { background: #f39c12; color: white; }
    #reportBtn:hover { background: #e67e22; }

.ad-space {
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      color: #666;
      margin-bottom: 20px;
    }
.ad-banner { height: 90px; }
.ad-sidebar { height: 250px; }

.hidden { display: none!important; }

    @media (max-width: 900px) {
.main-content { flex-direction: column; }
      #videos { grid-template-columns: 1fr; }
      #start-screen h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="start-screen">
      <h1>AnonChat.cam</h1>
      <p>Talk to strangers anonymously. No login required.</p>
      
      <div class="filter-section">
        <h3>🎯 Match Preferences</h3>
        
        <div class="filter-row">
          <label>Country</label>
          <select id="countryFilter">
            <option value="any">🌍 Any Country</option>
            <option value="IN">🇮🇳 India Only</option>
            <option value="US">🇺🇸 USA Only</option>
            <option value="GB">🇬🇧 UK Only</option>
            <option value="CA">🇨🇦 Canada Only</option>
          </select>
        </div>

        <div class="filter-row">
          <label>Interests — Pick up to 3</label>
          <div class="interest-tags" id="interestTags">
            <div class="tag" data-tag="gaming">🎮 Gaming</div>
            <div class="tag" data-tag="music">🎵 Music</div>
            <div class="tag" data-tag="movies">🎬 Movies</div>
            <div class="tag" data-tag="study">📚 Study</div>
            <div class="tag" data-tag="sports">⚽ Sports</div>
            <div class="tag" data-tag="anime">🎌 Anime</div>
            <div class="tag" data-tag="tech">💻 Tech</div>
            <div class="tag" data-tag="chat">💬 Just Chat</div>
          </div>
        </div>
      </div>

      <button id="videoBtn" class="mode-btn" onclick="startChat('video')">📹 Video Chat</button>
      <button id="textBtn" class="mode-btn" onclick="startChat('text')">💬 Text Only</button>
      <div class="ad-space ad-banner" style="margin-top: 40px;">Ad Space - 728x90</div>
    </div>

    <div id="chat-screen">
      <div id="status">
        <div id="statusText">Connecting...</div>
        <div class="status-match" id="matchInfo"></div>
      </div>
      <div class="main-content">
        <div class="video-section">
          <div id="videos">
            <div class="video-wrapper">
              <span class="video-label">You</span>
              <video id="localVideo" autoplay muted playsinline></video>
            </div>
            <div class="video-wrapper">
              <span class="video-label">Stranger</span>
              <video id="remoteVideo" autoplay playsinline></video>
            </div>
          </div>
          <div id="messages"></div>
          <input id="msgInput" placeholder="Waiting for stranger..." disabled onkeypress="if(event.key==='Enter')sendMessage()" />
          <div class="btn-row">
            <button id="backBtn" class="action-btn" onclick="backToHome()">🏠 Home</button>
            <button id="reportBtn" class="action-btn" onclick="reportUser()">⚠️ Report</button>
            <button id="nextBtn" class="action-btn" onclick="nextStranger()">⏭️ Next</button>
          </div>
        </div>
        <div class="sidebar">
          <div class="ad-space ad-sidebar">Ad Space<br>300x250</div>
          <div class="ad-space ad-sidebar">Ad Space<br>300x250</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let pc = null;
    let localStream = null;
    let remoteStream = null;
    let mode = 'video';
    let selectedInterests = [];
    let selectedCountry = 'any';

    const servers = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    };

    // Interest tag selection
    document.querySelectorAll('.tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const tagName = tag.dataset.tag;
        if (tag.classList.contains('active')) {
          tag.classList.remove('active');
          selectedInterests = selectedInterests.filter(t => t!== tagName);
        } else if (selectedInterests.length < 3) {
          tag.classList.add('active');
          selectedInterests.push(tagName);
        }
      });
    });

    document.getElementById('countryFilter').addEventListener('change', (e) => {
      selectedCountry = e.target.value;
    });

    async function startChat(selectedMode) {
      mode = selectedMode;
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'block';
      document.getElementById('messages').innerHTML = '';

      if (mode === 'video') {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          document.getElementById('localVideo').srcObject = localStream;
          document.getElementById('videos').classList.remove('hidden');
        } catch (err) {
          alert('Camera/mic blocked. Switching to Text Only mode.');
          mode = 'text';
          document.getElementById('videos').classList.add('hidden');
        }
      } else {
        document.getElementById('videos').classList.add('hidden');
      }

      socket.emit('join', { 
        mode, 
        interests: selectedInterests, 
        country: selectedCountry 
      });
    }

    function createPeerConnection() {
      pc = new RTCPeerConnection(servers);
      if (localStream && mode === 'video') {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      }
      pc.ontrack = (event) => {
        remoteStream = event.streams[0];
        document.getElementById('remoteVideo').srcObject = remoteStream;
      };
      pc.onicecandidate = (event) => {
        if (event.candidate) socket.emit('ice-candidate', event.candidate);
      };
    }

    async function makeCall() {
      createPeerConnection();
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('offer', offer);
    }

    socket.on('create-offer', () => makeCall());

    socket.on('offer', async (offer) => {
      createPeerConnection();
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('answer', answer);
    });

    socket.on('answer', async (answer) => {
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
    });

    socket.on('ice-candidate', async (candidate) => {
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate));
    });

    socket.on('partner-disconnected', () => {
      if (pc) { pc.close(); pc = null; }
      document.getElementById('remoteVideo').srcObject = null;
      addMessage('Stranger disconnected.', 'system');
    });

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const msg = input.value.trim();
      if (msg &&!input.disabled) {
        socket.emit('message', msg);
        addMessage('You: ' + msg, 'you');
        input.value = '';
      }
    }

    function addMessage(msg, type = 'stranger') {
      const div = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = type;
      msgDiv.textContent = msg;
      div.appendChild(msgDiv);
      div.scrollTop = div.scrollHeight;
    }

    socket.on('message', (msg) => addMessage(msg, 'stranger'));
    
    socket.on('status', (data) => {
      if (typeof data === 'string') {
        document.getElementById('statusText').innerText = data;
        document.getElementById('matchInfo').innerText = '';
      } else {
        document.getElementById('statusText').innerText = data.text;
        document.getElementById('matchInfo').innerText = data.matchInfo || '';
      }
      
      const msgInput = document.getElementById('msgInput');
      if (data.text === 'Connected! Say hi.' || data === 'Connected! Say hi.') {
        msgInput.disabled = false;
        msgInput.placeholder = 'Type a message and press Enter...';
      } else {
        msgInput.disabled = true;
        msgInput.placeholder = 'Waiting for stranger...';
      }
    });

    function nextStranger() {
      if (pc) { pc.close(); pc = null; }
      document.getElementById('remoteVideo').srcObject = null;
      document.getElementById('messages').innerHTML = '';
      document.getElementById('msgInput').disabled = true;
      document.getElementById('msgInput').placeholder = 'Searching for stranger...';
      document.getElementById('statusText').innerText = 'Searching for stranger...';
      document.getElementById('matchInfo').innerText = '';
      socket.emit('next');
    }

    function backToHome() {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      if (pc) { pc.close(); pc = null; }
      socket.emit('leave');
      document.getElementById('remoteVideo').srcObject = null;
      document.getElementById('localVideo').srcObject = null;
      document.getElementById('messages').innerHTML = '';
      document.getElementById('msgInput').disabled = true;
      document.getElementById('msgInput').placeholder = 'Waiting for stranger...';
      document.getElementById('chat-screen').style.display = 'none';
      document.getElementById('start-screen').style.display = 'block';
    }

    function reportUser() {
      socket.emit('report');
      addMessage('User reported. Finding new stranger...', 'system');
      nextStranger();
    }

    window.onbeforeunload = () => {
      if (localStream) localStream.getTracks().forEach(track => track.stop());
    };
  </script>
</body>
</html>
